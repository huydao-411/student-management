<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
      rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>
</head>

<body>

<h1>Chi Tiết Sinh Viên</h1>

<p><strong>ID:</strong> <span th:text="${student.id}"></span></p>
<p><strong>Tên:</strong> <span th:text="${student.name}"></span></p>
<p><strong>Email:</strong> <span th:text="${student.email}"></span></p>
<p><strong>Tuổi:</strong> <span th:text="${student.age}"></span></p>

<br>

<!-- Nút Chỉnh Sửa -->
<a th:href="@{/students/edit/{id}(id=${student.id})}">
    <button type="button">Chỉnh Sửa</button>
</a>

<!-- Nút Xóa -->
<form th:action="@{/students/delete/{id}(id=${student.id})}"
      method="post"
      style="display:inline;"
      onsubmit="return confirm('Bạn có chắc muốn xóa sinh viên này?');">

    <button type="submit">Xóa</button>
</form>

<br><br>
<a href="/students">⬅ Quay lại danh sách</a>

</body>
</html>
