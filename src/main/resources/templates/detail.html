<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Sinh Viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:500px;">

    <h3 class="mb-4 text-center">Chi Tiết Sinh Viên</h3>

    <div class="mb-3">
        <label class="form-label">ID</label>
        <input class="form-control" th:value="${student.id}" readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Tên</label>
        <input class="form-control" th:value="${student.name}" readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" th:value="${student.email}" readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Tuổi</label>
        <input class="form-control" th:value="${student.age}" readonly>
    </div>

    <div class="d-flex justify-content-between">

        <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning">
            Sửa
        </a>

        <form th:action="@{/students/delete/{id}(id=${student.id})}"
              method="post"
              onsubmit="return confirm('Bạn có chắc muốn xóa?');">

            <button class="btn btn-danger">Xóa</button>
        </form>
    </div>

    <div class="text-center mt-3">
        <a href="/students" class="btn btn-secondary">Quay lại</a>
    </div>

</div>

</body>
</html>
