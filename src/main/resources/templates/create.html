<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Sinh Viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:500px;">

    <h3 class="mb-4 text-center"
        th:text="${student.id} != null ? 'Chỉnh Sửa Sinh Viên' : 'Thêm Sinh Viên'">
    </h3>

    <form th:action="@{/students/save}" th:object="${student}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Tên</label>
            <input type="text" class="form-control" th:field="*{name}" placeholder="Nhập tên">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" placeholder="Nhập email">
        </div>

        <div class="mb-3">
            <label class="form-label">Tuổi</label>
            <input type="number" class="form-control" th:field="*{age}" placeholder="Nhập tuổi">
        </div>

        <button class="btn btn-success w-100">Lưu</button>
    </form>

</div>

</body>
</html>
