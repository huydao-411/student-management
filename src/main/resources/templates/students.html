<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
      rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>
</head>

<body>

<h1>Danh Sách Sinh Viên (SSR)</h1>

<!-- Thanh chức năng -->
<div style="margin-bottom:15px;">
    <form action="/students" method="GET" style="display:inline;">
        <input type="text" name="keyword" placeholder="Nhập tên..." />
        <button type="submit">Tìm</button>
    </form>

    <!-- Nút Thêm Mới -->
    <a href="/students/create">
        <button type="button">Thêm Mới</button>
    </a>
</div>

<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>ID</th>
            <th>Họ và Tên</th>
            <th>Email</th>
            <th>Tuổi</th>
            <th>Hành động</th> <!-- Cột mới -->
        </tr>
    </thead>

    <tbody>
        <tr th:each="student : ${dsSinhVien}"
            th:classappend="${student.age < 18} ? ' text-danger'">

            <td th:text="${student.id}">ID</td>
            <td th:text="${student.name}">Tên</td>
            <td th:text="${student.email}">Email</td>
            <td th:text="${student.age}">Tuổi</td>

            <!-- Nút Xem Chi Tiết -->
            <td>
                <a th:href="@{/students/{id}(id=${student.id})}">
                    <button type="button">Xem Chi Tiết</button>
                </a>
            </td>

        </tr>
    </tbody>
</table>

</body>
</html>
