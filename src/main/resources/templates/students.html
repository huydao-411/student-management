<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sinh Viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">📋 Danh Sách Sinh Viên</h2>

    <!-- Thanh chức năng -->
    <div class="d-flex justify-content-between mb-3">

        <form action="/students" method="GET" class="d-flex">
            <input type="text" name="keyword" class="form-control me-2" placeholder="Nhập tên...">
            <button class="btn btn-primary">Tìm</button>
        </form>

        <a href="/students/create" class="btn btn-success">
            + Thêm Mới
        </a>

    </div>

    <table class="table table-bordered table-hover bg-white">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Họ và Tên</th>
                <th>Email</th>
                <th>Tuổi</th>
                <th>Hành động</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="student : ${dsSinhVien}"
                th:classappend="${student.age < 18} ? 'table-danger'">

                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.age}"></td>

                <td>
                    <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-info btn-sm">
                        Xem
                    </a>

                    <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <form th:action="@{/students/delete/{id}(id=${student.id})}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('Bạn có chắc muốn xóa?');">

                        <button class="btn btn-danger btn-sm">Xóa</button>
                    </form>
                </td>

            </tr>
        </tbody>

    </table>
    <script id="u6t7u9">
        if (window.location.search) {
            window.history.replaceState({}, document.title, "/students");
        }
    </script>
</div>

</body>
</html>
